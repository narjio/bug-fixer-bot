name = "email-cache-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV Namespace — create via: npx wrangler kv namespace create EMAIL_CACHE
# Then paste the id below
[[kv_namespaces]]
binding = "EMAIL_CACHE"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# Environment variables — set via Cloudflare dashboard or:
# npx wrangler secret put SUPABASE_URL
# npx wrangler secret put SUPABASE_KEY
[vars]
# SUPABASE_URL = "https://your-project.supabase.co"  # Set as secret instead
# SUPABASE_KEY = "your-anon-key"                      # Set as secret instead
